openapi: 3.0.3
info:
  title: Small Business Web Backend API
  description: |
    A comprehensive REST API for small business management built with Slim Framework 4.0 and SQLite.

    ## Features
    - Product and inventory management
    - Order processing and fulfillment
    - Customer testimonials and reviews
    - User authentication and authorization
    - Coupon and discount system
    - Referral program
    - Tax rate management
    - Return and refund processing
    - Bookkeeping and financial reporting

    ## Authentication
    Most endpoints require JWT authentication. Include the token in the Authorization header:
    ```
    Authorization: Bearer <your-jwt-token>
    ```
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8000
    description: Development server
  - url: https://api.smallbusiness.com
    description: Production server

security:
  - bearerAuth: []

paths:
  # Health Check
  /health:
    get:
      summary: Health check endpoint
      description: Check if the API is running and database is accessible
      tags:
        - Health
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: "healthy"
                timestamp: "2025-11-22T05:44:47Z"
                database: "connected"

  # Authentication
  /auth/register:
    post:
      summary: Register a new user
      description: Create a new user account with email and password
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: "user@example.com"
              password: "securepassword123"
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSuccessResponse'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      summary: User login
      description: Authenticate user and return JWT token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "user@example.com"
              password: "securepassword123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      summary: User logout
      description: Invalidate the current session
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /auth/refresh:
    post:
      summary: Refresh access token
      description: Generate a new access token using existing session
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /auth/forgot-password:
    post:
      summary: Request password reset
      description: Send a password reset email to the user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
            example:
              email: "user@example.com"
      responses:
        '200':
          description: Password reset email sent (if email exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/reset-password:
    post:
      summary: Reset password
      description: Reset user password using reset token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
            example:
              token: "reset-token-here"
              password: "newsecurepassword123"
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  /auth/change-password:
    post:
      summary: Change password
      description: Change password for authenticated user
      tags:
        - Authentication
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - current_password
                - new_password
              properties:
                current_password:
                  type: string
                  description: Current password
                new_password:
                  type: string
                  minLength: 8
                  description: New password (minimum 8 characters)
            example:
              current_password: "current_password_123"
              new_password: "new_secure_password_456"
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid input or incorrect current password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    # Users
  /users:
    get:
      summary: Get all users
      description: Retrieve a list of all users (admin only)
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        email:
                          type: string
                        role:
                          type: string
                        created_at:
                          type: string
                          format: date-time

  /users/customers:
    get:
      summary: Get all customers
      description: Retrieve a list of all users with role 'customer'
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of customer users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        email:
                          type: string
                        role:
                          type: string
                        created_at:
                          type: string
                          format: date-time
              example:
                success: true
                data:
                  - id: 1
                    email: "customer@example.com"
                    role: "customer"
                    created_at: "2025-11-25 05:00:00"

  /clients:
    get:
      summary: Get all clients with full data
      description: |
        Retrieve a comprehensive list of all customers with their complete profile data and order statistics.
        Returns detailed information including contact details, address, social media links, and purchasing history.
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of clients with full profile and order statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Client'
              example:
                success: true
                data:
                  - id: 1
                    email: "customer@example.com"
                    display_name: "John Doe"
                    role: "customer"
                    is_email_verified: 1
                    created_at: "2025-11-25 05:00:00"
                    last_login: "2025-11-26 10:30:00"
                    first_name: "John"
                    last_name: "Doe"
                    country: "Germany"
                    street_line_1: "123 Main Street"
                    street_line_2: "Apt 4B"
                    city: "Berlin"
                    state: "Berlin"
                    postal_code: "10115"
                    mobile_number: "+49123456789"
                    whatsapp_number: "+49123456789"
                    instagram_link: "https://instagram.com/johndoe"
                    facebook_link: "https://facebook.com/johndoe"
                    order_count: 5
                    total_spent: 249.99
                    last_order_date: "2025-11-20 14:30:00"
        '401':
          description: Unauthorized - Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{id}:
    get:
      summary: Get user by ID
      description: Retrieve a specific user's information
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: User ID
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                      email:
                        type: string
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Products
  /products:
    get:
      summary: Get all products
      description: Retrieve a list of all products with basic information
      tags:
        - Products
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductSummary'
    post:
      summary: Create a new product
      description: Add a new product to the catalog
      tags:
        - Products
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /products/types:
    get:
      summary: Get unique product types
      description: Retrieve a list of all unique product types available in the catalog
      tags:
        - Products
      responses:
        '200':
          description: List of unique product types
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: string

  /products/type/{type}:
    get:
      summary: Get products by type
      description: Retrieve a paginated list of products filtered by type
      tags:
        - Products
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
          description: Product type
        - name: page
          in: query
          description: Page number
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: Items per page
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Paginated list of products by type
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /products/{id}:
    get:
      summary: Get product by ID
      description: Retrieve detailed information about a specific product
      tags:
        - Products
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Product ID
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update product
      description: Modify an existing product's information
      tags:
        - Products
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Product ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateRequest'
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete product
      description: Remove a product from the catalog
      tags:
        - Products
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Product ID
      responses:
        '204':
          description: Product deleted successfully
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Stores
  /stores:
    get:
      summary: Get all stores
      description: Retrieve a list of all store locations
      tags:
        - Stores
      responses:
        '200':
          description: List of stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Store'
    post:
      summary: Create a new store
      description: Add a new store location
      tags:
        - Stores
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreCreateRequest'
      responses:
        '201':
          description: Store created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Store'

  /stores/{id}:
    get:
      summary: Get store by ID
      description: Retrieve detailed information about a specific store
      tags:
        - Stores
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Store ID
      responses:
        '200':
          description: Store details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Store'
    put:
      summary: Update store
      description: Modify store information
      tags:
        - Stores
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Store ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreUpdateRequest'
      responses:
        '200':
          description: Store updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Store'
    delete:
      summary: Delete store
      description: Remove a store location
      tags:
        - Stores
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Store ID
      responses:
        '204':
          description: Store deleted successfully

  # Inventory
  /inventory:
    get:
      summary: Get all inventory items
      description: Retrieve inventory levels for all products across all stores
      tags:
        - Inventory
      responses:
        '200':
          description: List of inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InventoryItem'
    post:
      summary: Create inventory item
      description: Add inventory for a product at a specific store
      tags:
        - Inventory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryCreateRequest'
      responses:
        '201':
          description: Inventory item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryItem'

  /inventory/{id}:
    get:
      summary: Get inventory item by ID
      description: Retrieve inventory information for a specific item
      tags:
        - Inventory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Inventory item ID
      responses:
        '200':
          description: Inventory item details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryItem'
    put:
      summary: Update inventory item
      description: Modify inventory quantity or settings
      tags:
        - Inventory
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Inventory item ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryUpdateRequest'
      responses:
        '200':
          description: Inventory updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryItem'
    delete:
      summary: Delete inventory item
      description: Remove inventory tracking for a product-store combination
      tags:
        - Inventory
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Inventory item ID
      responses:
        '204':
          description: Inventory item deleted

  /inventory/low-stock:
    get:
      summary: Get low stock items
      description: Retrieve inventory items that are below minimum stock levels
      tags:
        - Inventory
      responses:
        '200':
          description: List of low stock items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InventoryItem'

  # Orders
  /orders:
    get:
      summary: Get all orders (admin)
      description: Retrieve all orders (requires admin privileges)
      tags:
        - Orders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of all orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
    post:
      summary: Create a new order
      description: Place a new order with items
      tags:
        - Orders
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

  /orders/my:
    get:
      summary: Get my orders
      description: Retrieve orders placed by the authenticated user
      tags:
        - Orders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of user's orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'

  /orders/{id}:
    get:
      summary: Get order by ID
      description: Retrieve detailed information about a specific order
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Order ID
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
    put:
      summary: Update order
      description: Modify order information (admin only)
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Order ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderUpdateRequest'
      responses:
        '200':
          description: Order updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

    delete:
      summary: Delete order
      description: Permanently delete an order and its associated records (admin only)
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Order ID
      responses:
        '204':
          description: Order deleted successfully
        '403':
          description: Unauthorized (Admin access required)
        '404':
          description: Order not found

  /orders/{id}/cancel:
    post:
      summary: Cancel order
      description: Cancel an order and restore inventory
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Order ID
      responses:
        '200':
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'

  # Tax Rates
  /tax-rates:
    get:
      summary: Get all tax rates
      description: Retrieve all configured tax rates
      tags:
        - Tax
      responses:
        '200':
          description: List of tax rates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaxRate'
    post:
      summary: Create tax rate
      description: Add a new tax rate configuration
      tags:
        - Tax
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaxRateCreateRequest'
      responses:
        '201':
          description: Tax rate created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxRate'

  /tax-rates/default:
    get:
      summary: Get default tax rate
      description: Retrieve the default tax rate configuration
      tags:
        - Tax
      responses:
        '200':
          description: Default tax rate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaxRate'

  # Testimonials
  /testimonials:
    get:
      summary: Get published testimonials
      description: Retrieve all published customer testimonials
      tags:
        - Testimonials
      responses:
        '200':
          description: List of published testimonials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Testimonial'
    post:
      summary: Create testimonial
      description: Submit a new customer testimonial
      tags:
        - Testimonials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestimonialCreateRequest'
      responses:
        '201':
          description: Testimonial submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Testimonial'

  # Reviews
  /reviews:
    get:
      summary: Get all published reviews
      description: Retrieve all published product reviews
      tags:
        - Reviews
      responses:
        '200':
          description: List of published reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
    post:
      summary: Create review
      description: Submit a new product review
      tags:
        - Reviews
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreateRequest'
      responses:
        '201':
          description: Review created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'

  /reviews/my:
    get:
      summary: Get my reviews
      description: Retrieve reviews submitted by the authenticated user
      tags:
        - Reviews
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of user's reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'

  /reviews/{id}:
    get:
      summary: Get review by ID
      description: Retrieve a specific review
      tags:
        - Reviews
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Review ID
      responses:
        '200':
          description: Review details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
    put:
      summary: Update review
      description: Modify a review (owner only)
      tags:
