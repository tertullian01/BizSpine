components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Authorization header using the Bearer scheme

  schemas:
    # Common Response Schemas
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
          description: Success message
      required:
        - message

    Pagination:
      type: object
      properties:
        current_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        total_pages:
          type: integer
        has_next:
          type: boolean
        has_prev:
          type: boolean
        next_page:
          type: integer
          nullable: true
        prev_page:
          type: integer
          nullable: true

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        timestamp:
          type: string
          format: date-time
        database:
          type: string
          enum: [connected, disconnected]
      required:
        - status
        - timestamp
        - database

    # Authentication Schemas
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User email address
        password:
          type: string
          minLength: 8
          description: User password (minimum 8 characters)
      required:
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User email address
        password:
          type: string
          description: User password
      required:
        - email
        - password

    ForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: User email address for password reset
      required:
        - email

    ResetPasswordRequest:
      type: object
      properties:
        token:
          type: string
          description: Password reset token
        password:
          type: string
          minLength: 8
          description: New password (minimum 8 characters)
      required:
        - token
        - password

    AuthSuccessResponse:
      type: object
      properties:
        message:
          type: string
          description: Success message
        email:
          type: string
          format: email
          description: Registered email address
      required:
        - message
        - email

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT access token
        token_type:
          type: string
          default: Bearer
        expires_in:
          type: integer
          description: Token expiration time in seconds
      required:
        - access_token

    # User Schema
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          type: string
          enum: [customer, employee, admin]
        first_name:
          type: string
        last_name:
          type: string
        country:
          type: string
        street_line_1:
          type: string
        street_line_2:
          type: string
        city:
          type: string
        state:
          type: string
        postal_code:
          type: string
        mobile_number:
          type: string
        whatsapp_number:
          type: string
        instagram_link:
          type: string
        facebook_link:
          type: string
        created_at:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time

    # Client Schema (extended User with order statistics)
    Client:
      type: object
      description: Customer with full profile data and order statistics
      properties:
        id:
          type: integer
          description: Client ID
        email:
          type: string
          format: email
          description: Email address
        display_name:
          type: string
          description: Display name
        role:
          type: string
          enum: [customer]
          description: User role (always 'customer' for clients)
        is_email_verified:
          type: integer
          description: Email verification status (0 or 1)
        created_at:
          type: string
          format: date-time
          description: Account creation timestamp
        last_login:
          type: string
          format: date-time
          description: Last login timestamp
        first_name:
          type: string
          description: First name
        last_name:
          type: string
          description: Last name
        country:
          type: string
          description: Country
        street_line_1:
          type: string
          description: Street address line 1
        street_line_2:
          type: string
          description: Street address line 2
        city:
          type: string
          description: City
        state:
          type: string
          description: State/Province
        postal_code:
          type: string
          description: Postal/ZIP code
        mobile_number:
          type: string
          description: Mobile phone number
        whatsapp_number:
          type: string
          description: WhatsApp number
        instagram_link:
          type: string
          description: Instagram profile URL
        facebook_link:
          type: string
          description: Facebook profile URL
        order_count:
          type: integer
          description: Total number of orders placed
        total_spent:
          type: number
          format: float
          description: Total amount spent across all orders
        last_order_date:
          type: string
          format: date-time
          nullable: true
          description: Date of the most recent order
      required:
        - id
        - email
        - role
        - order_count
        - total_spent

    # Product Schemas
    ProductSummary:
      type: object
      properties:
        id:
          type: integer
          description: Product ID
        name:
          type: string
          description: Product name
        type:
          type: string
          description: Product type/category
        cost:
          type: number
          format: float
          description: Product cost
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
      required:
        - id
        - name

    Product:
      allOf:
        - $ref: '#/components/schemas/ProductSummary'
        - type: object
          properties:
            description:
              type: string
              description: Product description
            featured_ingredients:
              type: string
              description: Key ingredients
            all_ingredients:
              type: string
              description: Complete ingredient list
            size:
              type: string
              description: Product size/package
            image_url:
              type: string
              description: URL to product image
            state:
              type: string
              enum: [For Sale, Discontinued]
              description: Product availability state

    ProductCreateRequest:
      type: object
      properties:
        name:
          type: string
          description: Product name
        type:
          type: string
          description: Product type/category
        description:
          type: string
          description: Product description
        cost:
          type: number
          format: float
          description: Product cost
        featured_ingredients:
          type: string
          description: Key ingredients
        all_ingredients:
          type: string
          description: Complete ingredient list
        size:
          type: string
          description: Product size/package
        image_url:
          type: string
          description: URL to product image
        state:
          type: string
          enum: [For Sale, Discontinued]
          default: For Sale
          description: Product availability state
      required:
        - name

    ProductUpdateRequest:
      type: object
      properties:
        name:
          type: string
          description: Product name
        type:
          type: string
          description: Product type/category
        description:
          type: string
          description: Product description
        cost:
          type: number
          format: float
          description: Product cost
        featured_ingredients:
          type: string
          description: Key ingredients
        all_ingredients:
          type: string
          description: Complete ingredient list
        size:
          type: string
          description: Product size/package
        image_url:
          type: string
          description: URL to product image
        state:
          type: string
          enum: [For Sale, Discontinued]
          description: Product availability state

    # Store Schemas
    Store:
      type: object
      properties:
        id:
          type: integer
          description: Store ID
        name:
          type: string
          description: Store name
        description:
          type: string
          description: Store description
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
      required:
        - id
        - name

    StoreCreateRequest:
      type: object
      properties:
        name:
          type: string
          description: Store name
        description:
          type: string
          description: Store description
      required:
        - name

    StoreUpdateRequest:
      type: object
      properties:
        name:
          type: string
          description: Store name
        description:
          type: string
          description: Store description

    # Inventory Schemas
    InventoryItem:
      type: object
      properties:
        id:
          type: integer
          description: Inventory item ID
        product_id:
          type: integer
          description: Product ID
        store_id:
          type: integer
          description: Store ID
        quantity:
          type: integer
          description: Current stock quantity
        min_quantity:
          type: integer
          description: Minimum stock level
        product_name:
          type: string
          description: Product name
        store_name:
          type: string
          description: Store name
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
      required:
        - id
        - product_id
        - store_id
        - quantity

    InventoryCreateRequest:
      type: object
      properties:
        product_id:
          type: integer
          description: Product ID
        store_id:
          type: integer
          description: Store ID
        quantity:
          type: integer
          description: Initial stock quantity
        min_quantity:
          type: integer
          default: 0
          description: Minimum stock level
      required:
        - product_id
        - store_id

    InventoryUpdateRequest:
      type: object
      properties:
        quantity:
          type: integer
          description: New stock quantity
        min_quantity:
          type: integer
          description: Minimum stock level

    # Order Schemas
    Order:
      type: object
      properties:
        id:
          type: integer
          description: Order ID
        user_id:
          type: integer
          description: User ID
        store_id:
          type: integer
          description: Store ID
        order_number:
          type: string
          description: Unique order number
        order_date:
          type: string
          format: date-time
          description: Order creation date
        fulfillment_status:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]
          description: Order fulfillment status
        shipping_address:
          type: string
          description: Shipping address
        phone_number:
          type: string
          description: Contact phone number
        subtotal:
          type: number
          format: float
          description: Order subtotal
        discount_amount:
          type: number
          format: float
          description: Total discount applied
        total:
          type: number
          format: float
          description: Final order total
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
          description: Order items
      required:
        - id
        - user_id
        - store_id
        - order_number
        - fulfillment_status

    OrderItem:
      type: object
      properties:
        id:
          type: integer
          description: Order item ID
        store_id:
          type: integer
          description: Store ID
        product_name:
          type: string
          description: Product name
        store_name:
          type: string
          description: Store name
        quantity:
          type: integer
          description: Ordered quantity
        unit_price:
          type: number
          format: float
          description: Price per unit
        subtotal:
          type: number
          format: float
          description: Item subtotal
      required:
        - id
        - store_id
        - quantity
        - unit_price
        - subtotal

    OrderCreateRequest:
      type: object
      properties:
        store_id:
          type: integer
          description: Store ID (optional, defaults to store of first item)
        shipping_address:
          type: string
          description: Shipping address
        phone_number:
          type: string
          description: Contact phone number
        items:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: integer
                description: Product ID
              store_id:
                type: integer
                description: Store ID
              quantity:
                type: integer
                description: Quantity to order
            required:
              - product_id
              - store_id
              - quantity
          description: Order items
      required:
        - shipping_address
        - items

    OrderUpdateRequest:
      type: object
      properties:
        store_id:
          type: integer
          description: Store ID
        fulfillment_status:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]
          description: New fulfillment status
        shipping_address:
          type: string
          description: Updated shipping address

    # Tax Schemas
    TaxRate:
      type: object
      properties:
        id:
          type: integer
          description: Tax rate ID
        name:
          type: string
          description: Tax rate name
        rate:
          type: number
          format: float
          description: Tax rate percentage
        region:
          type: string
          description: Geographic region
        is_default:
          type: boolean
          description: Whether this is the default tax rate
        description:
          type: string
          description: Tax rate description
      required:
        - id
        - name
        - rate

    TaxRateCreateRequest:
      type: object
      properties:
        name:
          type: string
          description: Tax rate name
        rate:
          type: number
          format: float
          description: Tax rate percentage
        region:
          type: string
          description: Geographic region
        is_default:
          type: boolean
          default: false
          description: Whether this is the default tax rate
        description:
          type: string
          description: Tax rate description
      required:
        - name
        - rate

    # Testimonial Schemas
    Testimonial:
      type: object
      properties:
        id:
          type: integer
          description: Testimonial ID
        customer_name:
          type: string
          description: Customer name
        customer_email:
          type: string
          format: email
          description: Customer email
        testimonial_text:
          type: string
          description: Testimonial content
        age_range:
          type: string
          description: Customer age range
        published:
          type: boolean
          description: Whether testimonial is published
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
      required:
        - id
        - customer_name
        - testimonial_text

    TestimonialCreateRequest:
      type: object
      properties:
        customer_name:
          type: string
          description: Customer name
        customer_email:
          type: string
          format: email
          description: Customer email
        testimonial_text:
          type: string
          description: Testimonial content
        age_range:
          type: string
          description: Customer age range
      required:
        - customer_name
        - testimonial_text

    # Review Schemas
    Review:
      type: object
      properties:
        id:
          type: integer
          description: Review ID
        user_id:
          type: integer
          description: User ID
        product_id:
          type: integer
          description: Product ID
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Rating (1-5 stars)
        title:
          type: string
          description: Review title
        comment:
          type: string
          description: Review comment
        published:
          type: boolean
          description: Whether review is published
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
      required:
        - id
        - user_id
        - product_id
        - rating

    ReviewCreateRequest:
      type: object
      properties:
        product_id:
          type: integer
          description: Product ID being reviewed
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Rating (1-5 stars)
        title:
          type: string
          description: Review title
        comment:
          type: string
          description: Review comment
      required:
        - product_id
        - rating

    ReviewUpdateRequest:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Rating (1-5 stars)
        title:
          type: string
          description: Review title
        comment:
          type: string
          description: Review comment

    # Bookkeeping Schemas
    Income:
      type: object
      properties:
        id:
          type: integer
          description: Income record ID
        order_id:
          type: integer
          description: Associated order ID
        amount:
          type: number
          format: float
          description: Income amount
        payment_method:
          type: string
          description: Payment method
        payment_date:
          type: string
          format: date-time
          description: Payment date
        description:
          type: string
          description: Income description
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
      required:
        - id
        - amount

    IncomeCreateRequest:
      type: object
      properties:
        order_id:
          type: integer
          description: Associated order ID
        amount:
          type: number
          format: float
          description: Income amount
        payment_method:
          type: string
          description: Payment method
        payment_date:
          type: string
          format: date-time
          description: Payment date
        description:
          type: string
          description: Income description
      required:
        - amount

    Expense:
      type: object
      properties:
        id:
          type: integer
          description: Expense record ID
        order_id:
          type: integer
          description: Associated order ID
        vendor:
          type: string
          description: Vendor/supplier name
        category:
          type: string
          description: Expense category
        amount:
          type: number
          format: float
          description: Expense amount
        expense_date:
          type: string
          format: date-time
          description: Expense date
        description:
          type: string
          description: Expense description
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
      required:
        - id
        - category
        - amount

    ExpenseCreateRequest:
      type: object
      properties:
        order_id:
          type: integer
          description: Associated order ID
        vendor:
          type: string
          description: Vendor/supplier name
        category:
          type: string
          description: Expense category
        amount:
          type: number
          format: float
          description: Expense amount
        expense_date:
          type: string
          format: date-time
          description: Expense date
        description:
          type: string
          description: Expense description
      required:
        - category
        - amount

    FinancialSummary:
      type: object
      properties:
        total_income:
          type: number
          format: float
          description: Total income amount
        total_expenses:
          type: number
          format: float
          description: Total expenses amount
        profit:
          type: number
          format: float
          description: Net profit (income - expenses)
        expenses_by_category:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
                description: Expense category
              total:
                type: number
                format: float
                description: Total for category
          description: Expense breakdown by category
      required:
        - total_income
        - total_expenses
        - profit
        - expenses_by_category

    # Referral Schemas
    ReferralInfo:
      type: object
      properties:
        user_id:
          type: integer
          description: User ID
        referral_code:
          type: string
          description: Unique referral code
        times_used:
          type: integer
          description: Number of times code was used
        points_earned:
          type: integer
          description: Total points earned
        points_redeemed:
          type: integer
          description: Points already redeemed
        points_balance:
          type: integer
          description: Available points balance
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
      required:
        - user_id
        - referral_code
        - times_used
        - points_earned
        - points_redeemed
        - points_balance

    ReferralUsage:
      type: object
      properties:
        id:
          type: integer
          description: Usage record ID
        referrer_user_id:
          type: integer
          description: Referrer user ID
        referred_user_id:
          type: integer
          description: Referred user ID
        referral_code:
          type: string
          description: Referral code used
        order_id:
          type: integer
          description: Associated order ID
        points_awarded:
          type: integer
          description: Points awarded for this usage
        used_at:
          type: string
          format: date-time
          description: Usage timestamp
      required:
        - id
        - referrer_user_id
        - referred_user_id
        - referral_code

    RedeemPointsRequest:
      type: object
      properties:
        points:
          type: integer
          minimum: 1
          description: Number of points to redeem
      required:
        - points

    RedeemPointsResponse:
      type: object
      properties:
        points_redeemed:
          type: integer
          description: Points successfully redeemed
        new_balance:
          type: integer
          description: Remaining points balance
      required:
        - points_redeemed
        - new_balance

    # Coupon Schemas
    Coupon:
      type: object
      properties:
        id:
          type: integer
          description: Coupon ID
        code:
          type: string
          description: Coupon code
        discount_type:
          type: string
          enum: [percentage, fixed]
          description: Type of discount
        discount_value:
          type: number
          format: float
          description: Discount value (percentage or fixed amount)
        min_purchase_amount:
          type: number
          format: float
          description: Minimum purchase amount required
        max_uses:
          type: integer
          description: Maximum number of uses
        times_used:
          type: integer
          description: Current usage count
        valid_from:
          type: string
          format: date-time
          description: Start validity date
        valid_until:
          type: string
          format: date-time
          description: End validity date
        is_active:
          type: boolean
          description: Whether coupon is active
        description:
          type: string
          description: Coupon description
      required:
        - id
        - code
        - discount_type
        - discount_value

    CouponCreateRequest:
      type: object
      properties:
        code:
          type: string
          description: Coupon code
        discount_type:
          type: string
          enum: [percentage, fixed]
          description: Type of discount
        discount_value:
          type: number
          format: float
          description: Discount value
        min_purchase_amount:
          type: number
          format: float
          default: 0
          description: Minimum purchase amount
        max_uses:
          type: integer
          description: Maximum uses
        valid_from:
          type: string
          format: date-time
          description: Start validity date
        valid_until:
          type: string
          format: date-time
          description: End validity date
        description:
          type: string
          description: Coupon description
      required:
        - code
        - discount_type
        - discount_value

    CouponUsageReport:
      type: object
      properties:
        coupon_id:
          type: integer
          description: Coupon ID
        code:
          type: string
          description: Coupon code
        times_used:
          type: integer
          description: Total usage count
        total_discount:
          type: number
          format: float
          description: Total discount amount given
        last_used:
          type: string
          format: date-time
          description: Last usage date
      required:
        - coupon_id
        - code
        - times_used
        - total_discount

    # Return Schemas
    Return:
      type: object
      properties:
        id:
          type: integer
          description: Return ID
        order_id:
          type: integer
          description: Associated order ID
        user_id:
          type: integer
          description: User who requested return
        return_number:
          type: string
          description: Unique return number
        status:
          type: string
          enum: [requested, approved, completed, rejected]
          description: Return status
        reason:
          type: string
          description: Return reason
        refund_amount:
          type: number
          format: float
          description: Total refund amount
        refund_method:
          type: string
          description: Refund payment method
        refund_date:
          type: string
          format: date-time
          description: Refund processing date
        notes:
          type: string
          description: Additional notes
        created_at:
          type: string
          format: date-time
          description: Creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
      required:
        - id
        - order_id
        - user_id
        - return_number
        - status

    ReturnCreateRequest:
      type: object
      properties:
        order_id:
          type: integer
          description: Order ID to return items from
        reason:
          type: string
          description: Return reason
        items:
          type: array
          items:
            type: object
            properties:
              order_item_id:
                type: integer
                description: Order item ID to return
              quantity:
                type: integer
                description: Quantity to return
              reason:
                type: string
                description: Item-specific return reason
            required:
              - order_item_id
              - quantity
          description: Items to return
      required:
        - order_id
        - reason
        - items

    RefundRequest:
      type: object
      properties:
        refund_method:
          type: string
          description: Refund payment method
        notes:
          type: string
          description: Refund processing notes
      required:
        - refund_method

