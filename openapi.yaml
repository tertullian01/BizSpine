openapi: 3.0.0
info:
  title: Small Business Web Backend API
  description: A comprehensive PHP/SQLite backend REST API designed to support a small business storefront with features for customer tracking, inventory management, store locations, and reviews.
  version: 1.0.0
servers:
  - url: http://localhost:8000
    description: Local Development Server
  - url: https://api.example.com/
    description: Production Server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        email: { type: string, format: email, nullable: true }
        display_name: { type: string }
        role: { type: string }
        is_email_verified: { type: integer }
    Product:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        type: { type: string }
        description: { type: string }
        featured_ingredients: { type: string }
        all_ingredients: { type: string }
        size: { type: string }
        cost: { type: number, format: float }
        image_url: { type: string }
        state: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Store:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
        location: { type: string }
        address: { type: string }
        phone: { type: string }
        email: { type: string }
        currency_symbol: { type: string }
    Inventory:
      type: object
      properties:
        id: { type: integer }
        product_id: { type: integer }
        store_id: { type: integer }
        quantity: { type: integer }
        min_quantity: { type: integer }
        max_quantity: { type: integer }
        price_override: { type: number, format: float, nullable: true }
        last_restocked: { type: string, format: date-time }
        product_name: { type: string, readOnly: true }
        store_name: { type: string, readOnly: true }
        product_cost: { type: number, format: float, readOnly: true }
    Order:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        store_id: { type: integer }
        order_number: { type: string }
        customer_email: { type: string, format: email, nullable: true }
        customer_name: { type: string }
        order_date: { type: string, format: date-time }
        fulfillment_status: { type: string, enum: [pending, processing, shipped, delivered, cancelled] }
        shipping_date: { type: string, format: date-time }
        shipping_address: { type: string, nullable: true }
        phone_number: { type: string }
        whatsapp_number: { type: string }
        subtotal: { type: number, format: float }
        discount_amount: { type: number, format: float }
        coupon_code: { type: string }
        referral_code: { type: string, description: "Write-only field for creating orders with referral" }
        points_to_redeem: { type: integer, description: "Write-only field for redeeming points during order creation" }
        shipping_cost: { type: number, format: float }
        total: { type: number, format: float }
        tax_rate: { type: number, format: float }
        tax_amount: { type: number, format: float }
        tracking_number: { type: string }
        tracking_url: { type: string }
        shipping_method: { type: string }
        shipping_carrier: { type: string }
        notes: { type: string }
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
    OrderItem:
      type: object
      properties:
        id: { type: integer }
        product_id: { type: integer }
        store_id: { type: integer }
        quantity: { type: integer }
        unit_price: { type: number, format: float }
        subtotal: { type: number, format: float }
    Review:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        product_id: { type: integer }
        order_id: { type: integer }
        rating: { type: integer, minimum: 1, maximum: 5 }
        review_text: { type: string }
        verified: { type: boolean }
        published: { type: boolean }
        created_at: { type: string, format: date-time }
    Testimonial:
      type: object
      properties:
        id: { type: integer }
        customer_name: { type: string }
        customer_email: { type: string }
        age_range: { type: string }
        testimonial_text: { type: string }
        rating: { type: integer }
        image_url: { type: string }
        published: { type: boolean }
        is_featured: { type: boolean }
        created_at: { type: string, format: date-time }
    Income:
      type: object
      properties:
        id: { type: integer }
        order_id: { type: integer }
        amount: { type: number }
        category: { type: string }
        payment_method: { type: string }
        description: { type: string }
        notes: { type: string }
        payment_date: { type: string, format: date-time }
    Expense:
      type: object
      properties:
        id: { type: integer }
        order_id: { type: integer }
        category: { type: string }
        amount: { type: number }
        vendor: { type: string }
        expense_date: { type: string, format: date-time }
        description: { type: string }
        receipt_image_url: { type: string }
        notes: { type: string }
    Coupon:
      type: object
      properties:
        id: { type: integer }
        code: { type: string }
        discount_type: { type: string, enum: [percentage, fixed] }
        discount_value: { type: number, format: float }
        min_purchase_amount: { type: number, format: float }
        max_uses: { type: integer }
        times_used: { type: integer }
        valid_from: { type: string, format: date-time }
        valid_until: { type: string, format: date-time }
        is_active: { type: boolean }
        description: { type: string }
    EmailLog:
      type: object
      properties:
        id: { type: integer }
        recipient: { type: string }
        subject: { type: string }
        reply_to: { type: string }
        body: { type: string }
        status: { type: string, enum: [sent, failed] }
        error_message: { type: string }
        sent_at: { type: string, format: date-time }

paths:
  /health:
    get:
      summary: API Health Check
      responses:
        '200':
          description: API is healthy

  /contact:
    post:
      summary: Send a contact message
      tags:
        - Contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, subject, message]
              properties:
                name: { type: string, example: "John Doe" }
                email: { type: string, format: email, example: "john@example.com" }
                subject: { type: string, example: "Inquiry" }
                message: { type: string, example: "Hello..." }
      responses:
        '200':
          description: Message sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      message: { type: string, example: "Message sent successfully" }
        '400':
          description: Validation error

  /contact/bulk:
    post:
      summary: Send a bulk order inquiry
      tags:
        - Contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email
                name: { type: string, example: "Jane Doe" }
                email: { type: string, format: email, example: "jane@company.com" }
                phone: { type: string, example: "+1234567890" }
                company: { type: string, example: "Big Corp" }
                shipping_address: { type: string, example: "
        '200':
          description: Inquiry sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      message: { type: string, example: "Inquiry sent successfully" }
        '400':
          description: Validation error

  # Authentication
  /auth/register:
    post:
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, display_name]
              properties:
                email: { type: string }
                password: { type: string, minLength: 8 }
                display_name: { type: string }
      responses:
        '201':
          description: User registered successfully
  /auth/login:
    post:
      summary: Login and receive JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
  /auth/logout:
    post:
      summary: Logout current user
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Logged out successfully
  /auth/refresh:
    post:
      summary: Refresh access token
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Token refreshed
  /auth/forgot-password:
    post:
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: Password reset email sent
  /auth/reset-password:
    post:
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string, minLength: 8 }
      responses:
        '200':
          description: Password reset successfully

  # Products
  /products:
    get:
      summary: List all products
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
          description: Items per page
        - in: query
          name: search
          schema:
            type: string
          description: Search term (name, description, type)
        - in: query
          name: sort
          schema:
            type: string
            enum: [name, cost, type, created_at, updated_at, state]
            default: name
          description: Sort field
        - in: query
          name: order
          schema:
            type: string
            enum: [ASC, DESC]
            default: ASC
          description: Sort order
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      summary: Create new product
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '201':
          description: Product created
  /products/{id}:
    get:
      summary: Get product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Product details
    put:
      summary: Update product
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
      responses:
        '200':
          description: Product updated
    delete:
      summary: Delete product
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Product deleted

  # Stores
  /stores:
    get:
      summary: List all stores
      responses:
        '200':
          description: List of stores
    post:
      summary: Create new store
      security: [{ bearerAuth: [] }]
      responses:
        '201':
          description: Store created
  /stores/{id}:
    get:
      summary: Get store by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Store details

  # Inventory
  /inventory:
    get:
      summary: List all inventory records
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
          description: Items per page
        - in: query
          name: search
          schema:
            type: string
          description: Search by product name or store name
        - in: query
          name: sort
          schema:
            type: string
            enum: [product_name, store_name, quantity, last_restocked, min_quantity, max_quantity]
          description: Field to sort by
        - in: query
          name: order
          schema:
            type: string
            enum: [ASC, DESC]
            default: ASC
          description: Sort order
      responses:
        '200':
          description: Inventory list
    post:
      summary: Create inventory record
      security: [{ bearerAuth: [] }]
      responses:
        '201':
          description: Inventory record created
  /inventory/low-stock:
    get:
      summary: Get low stock items
      responses:
        '200':
          description: List of low stock items
  /inventory/{id}/adjust:
    post:
      summary: Adjust inventory quantity
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                adjustment: { type: integer }
      responses:
        '200':
          description: Inventory adjusted

  # Orders
  /orders:
    get:
      summary: List all orders (Admin)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of orders
    post:
      summary: Create new order
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
      responses:
        '201':
          description: Order created
  /orders/my:
    get:
      summary: Get current user's orders
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: User's orders
  /orders/{id}/cancel:
    post:
      summary: Cancel order
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Order cancelled

  # Reviews
  /reviews:
    get:
      summary: List published reviews
      responses:
        '200':
          description: List of reviews
    post:
      summary: Create new review
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Review'
      responses:
        '201':
          description: Review created
  /reviews/{id}/publish:
    post:
      summary: Publish review (Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Review published

  # Testimonials
  /testimonials:
    get:
      summary: List published testimonials
      responses:
        '200':
          description: List of testimonials
    post:
      summary: Submit new testimonial
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Testimonial'
      responses:
        '201':
          description: Testimonial submitted
  /testimonials/admin:
    get:
      summary: List all testimonials (Admin)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: All testimonials

  # Bookkeeping
  /bookkeeping/income:
    get:
      summary: List income records
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Income records
    post:
      summary: Create income record
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Income'
      responses:
        '201':
          description: Income record created
  /bookkeeping/expenses:
    get:
      summary: List expenses
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Expense records
    post:
      summary: Create expense record
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Expense'
      responses:
        '201':
          description: Expense record created
  /bookkeeping/summary:
    get:
      summary: Get financial summary
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Financial summary

  # Referrals
  /referrals:
    get:
      summary: List all referrals (Admin)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of referrals
    post:
      summary: Create a referral code (Admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [client_id]
              properties:
                client_id: { type: integer }
                code: { type: string }
                discount_type: { type: string, enum: [percentage, fixed] }
                discount_value: { type: number }
                status: { type: string }
      responses:
        '201':
          description: Referral created
  /referrals/code/{code}:
    get:
      summary: Get referral details by code
      parameters:
        - in: path
          name: code
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Referral details
  /referrals/my:
    get:
      summary: Get user's referral code and stats
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Referral stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  referral_code: { type: string }
                  points_balance: { type: integer }
  /referrals/my/usage:
    get:
      summary: Get user's referral usage history
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Referral usage history
  /referrals/usage:
    post:
      summary: Manually add referral usage (Admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [referral_id, referred_user_id]
              properties:
                referral_id: { type: integer }
                referred_user_id: { type: integer }
                order_id: { type: integer }
      responses:
        '200':
          description: Usage recorded successfully
  /referrals/{id}/usage:
    get:
      summary: Get usage history for a specific referral (Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Referral usage history
  /referrals/redemption:
    post:
      summary: Manually redeem points for a referral (Admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [referral_id, amount]
              properties:
                referral_id: { type: integer }
                amount: { type: integer }
                notes: { type: string }
      responses:
        '200':
          description: Points redeemed successfully
  /referrals/redeem:
    post:
      summary: Redeem referral points
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Points redeemed
  /referrals/{id}:
    get:
      summary: Get referral by ID (Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Referral details
    put:
      summary: Update referral (Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                referral_code: { type: string }
                points_balance: { type: integer }
                status: { type: string }
      responses:
        '200':
          description: Referral updated
    delete:
      summary: Delete referral (Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Referral deleted

  # Users & Clients
  /users:
    get:
      summary: Get all users (Admin)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
  /users/customers:
    get:
      summary: Get all customers
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of customers
  /users/{id}:
    get:
      summary: Get user by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: User details
    put:
      summary: Update user details
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email, nullable: true }
                display_name: { type: string }
                role: { type: string }
      responses:
        '200':
          description: User updated
  /users/{id}/password:
    put:
      summary: Update user password (Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string, minLength: 8 }
      responses:
        '200':
          description: Password updated successfully
  /clients:
    get:
      summary: Get all clients with full profile data
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of clients
    post:
      summary: Create new client
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [display_name]
              properties:
                email: { type: string, format: email, nullable: true }
                display_name: { type: string }
                first_name: { type: string }
                last_name: { type: string }
                mobile_number: { type: string }
                whatsapp_number: { type: string }
                street_line_1: { type: string }
                street_line_2: { type: string }
                city: { type: string }
                state: { type: string }
                postal_code: { type: string }
                country: { type: string }
      responses:
        '201':
          description: Client created
  /clients/{id}:
    get:
      summary: Get client by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Client details
    put:
      summary: Update client details
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email, nullable: true }
                display_name: { type: string }
                first_name: { type: string }
                last_name: { type: string }
                mobile_number: { type: string }
                whatsapp_number: { type: string }
                street_line_1: { type: string }
                city: { type: string }
                country: { type: string }
      responses:
        '200':
          description: Client updated
  /clients/{id}/password:
    put:
      summary: Update client password (Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: { type: string, minLength: 8 }
      responses:
        '200':
          description: Password updated successfully

  # Employee Management
  /employees:
    get:
      summary: Manage employees
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of employees
    post:
      summary: Create employee
      security: [{ bearerAuth: [] }]
      responses:
        '201':
          description: Employee created
  /employees/{id}:
    put:
      summary: Update employee
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                display_name: { type: string }
                role: { type: string }
      responses:
        '200':
          description: Employee updated
    delete:
      summary: Delete employee
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Employee deleted

  # Email Logs
  /email-logs:
    get:
      summary: Get all email logs (Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
          description: Items per page
      responses:
        '200':
          description: A paginated list of email logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmailLog'