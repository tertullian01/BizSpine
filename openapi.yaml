openapi: 3.0.0
info:
  title: Small Business Web Backend API
  description: A comprehensive PHP/SQLite backend REST API designed to support a small business storefront with features for customer tracking, inventory management, store locations, and reviews.
  version: 1.0.0
servers:
  - url: http://localhost:8000
    description: Local Development Server
  - url: https://api.example.com/
    description: Production Server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        email: { type: string, format: email }
        display_name: { type: string }
        role: { type: string }
        is_email_verified: { type: integer }
    Product:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        type: { type: string }
        description: { type: string }
        featured_ingredients: { type: string }
        all_ingredients: { type: string }
        size: { type: string }
        cost: { type: number, format: float }
        image_url: { type: string }
        state: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Store:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
        location: { type: string }
        address: { type: string }
        phone: { type: string }
        email: { type: string }
        currency_symbol: { type: string }
    Inventory:
      type: object
      properties:
        id: { type: integer }
        product_id: { type: integer }
        store_id: { type: integer }
        quantity: { type: integer }
        min_quantity: { type: integer }
        max_quantity: { type: integer }
        last_restocked: { type: string, format: date-time }
    Order:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        store_id: { type: integer }
        order_number: { type: string }
        customer_email: { type: string, format: email }
        customer_name: { type: string }
        order_date: { type: string, format: date-time }
        fulfillment_status: { type: string, enum: [pending, processing, shipped, delivered, cancelled] }
        shipping_date: { type: string, format: date-time }
        shipping_address: { type: string }
        phone_number: { type: string }
        whatsapp_number: { type: string }
        subtotal: { type: number, format: float }
        discount_amount: { type: number, format: float }
        coupon_code: { type: string }
        referral_code: { type: string, description: "Write-only field for creating orders with referral" }
        shipping_cost: { type: number, format: float }
        total: { type: number, format: float }
        tax_rate: { type: number, format: float }
        tax_amount: { type: number, format: float }
        tracking_number: { type: string }
        tracking_url: { type: string }
        shipping_method: { type: string }
        shipping_carrier: { type: string }
        notes: { type: string }
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
    OrderItem:
      type: object
      properties:
        id: { type: integer }
        product_id: { type: integer }
        store_id: { type: integer }
        quantity: { type: integer }
        unit_price: { type: number, format: float }
        subtotal: { type: number, format: float }
    Review:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        product_id: { type: integer }
        order_id: { type: integer }
        rating: { type: integer, minimum: 1, maximum: 5 }
        review_text: { type: string }
        verified: { type: boolean }
        published: { type: boolean }
        created_at: { type: string, format: date-time }
    Testimonial:
      type: object
      properties:
        id: { type: integer }
        customer_name: { type: string }
        customer_email: { type: string }
        age_range: { type: string }
        testimonial_text: { type: string }
        rating: { type: integer }
        image_url: { type: string }
        published: { type: boolean }
        is_featured: { type: boolean }
        created_at: { type: string, format: date-time }
    Income:
      type: object
      properties:
        id: { type: integer }
        order_id: { type: integer }
        amount: { type: number }
        category: { type: string }
        payment_method: { type: string }
        description: { type: string }
        notes: { type: string }
        payment_date: { type: string, format: date-time }
    Expense:
      type: object
      properties:
        id: { type: integer }
        order_id: { type: integer }
        category: { type: string }
        amount: { type: number }
        vendor: { type: string }
        expense_date: { type: string, format: date-time }
        description: { type: string }
        receipt_image_url: { type: string }
        notes: { type: string }
    Coupon:
      type: object
      properties:
        id: { type: integer }
        code: { type: string }
        discount_type: { type: string, enum: [percentage, fixed] }
        discount_value: { type: number, format: float }
        min_purchase_amount: { type: number, format: float }
        max_uses: { type: integer }
        times_used: { type: integer }
        valid_from: { type: string, format: date-time }
        valid_until: { type: string, format: date-time }
        is_active: { type: boolean }
        description: { type: string }

paths:
  /health:
    get:
      summary: API Health Check
      responses:
        '200':
          description: API is healthy

  # Authentication
  /auth/register:
    post:
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, display_name]
              properties:
                email: { type: string }
                password: { type: string, minLength: 8 }
                display_name: { type: string }
      responses:
        '201':
          description: User registered successfully
  /auth/login:
    post:
      summary: Login and receive JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
  /auth/logout:
    post:
      summary: Logout current user
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Logged out successfully
  /auth/refresh:
    post:
      summary: Refresh access token
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Token refreshed
  /auth/forgot-password:
    post:
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: Password reset email sent
  /auth/reset-password:
    post:
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string, minLength: 8 }
      responses:
        '200':
          description: Password reset successfully

  # Products
  /products:
    get:
      summary: List all products
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
          description: Items per page
        - in: query
          name: search
          schema:
            type: string
          description: Search term (name, description, type)
        - in: query
          name: sort
          schema:
            type: string
            enum: [name, cost, type, created_at, updated_at, state]
            default: name
          description: Sort field
        - in: query
          name: order
          schema:
            type: string
            enum: [ASC, DESC]
            default: ASC
          description: Sort order
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      summary: Create new product
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Product'
      responses:
        '201':
          description: Product created
  /products/{id}:
    get:
      summary: Get product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Product details
    put:
      summary: Update product
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
      responses:
        '200':
          description: Product updated
    delete:
      summary: Delete product
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Product deleted

  # Stores
  /stores:
    get:
      summary: List all stores
      responses:
        '200':
          description: List of stores
    post:
      summary: Create new store
      security: [{ bearerAuth: [] }]
      responses:
        '201':
          description: Store created
  /stores/{id}:
    get:
      summary: Get store by ID
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Store details

  # Inventory
  /inventory:
    get:
      summary: List all inventory records
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
          description: Items per page
        - in: query
          name: search
          schema:
            type: string
          description: Search by product name or store name
        - in: query
          name: sort
          schema:
            type: string
            enum: [product_name, store_name, quantity, last_restocked, min_quantity, max_quantity]
          description: Field to sort by
        - in: query
          name: order
          schema:
            type: string
            enum: [ASC, DESC]
            default: ASC
          description: Sort order
      responses:
        '200':
          description: Inventory list
    post:
      summary: Create inventory record
      security: [{ bearerAuth: [] }]
      responses:
        '201':
          description: Inventory record created
  /inventory/low-stock:
    get:
      summary: Get low stock items
      responses:
        '200':
          description: List of low stock items
  /inventory/{id}/adjust:
    post:
      summary: Adjust inventory quantity
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                adjustment: { type: integer }
      responses:
        '200':
          description: Inventory adjusted

  # Orders
  /orders:
    get:
      summary: List all orders (Admin)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of orders
    post:
      summary: Create new order
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Order'
      responses:
        '201':
          description: Order created
  /orders/my:
    get:
      summary: Get current user's orders
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: User's orders
  /orders/{id}/cancel:
    post:
      summary: Cancel order
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Order cancelled

  # Reviews
  /reviews:
    get:
      summary: List published reviews
      responses:
        '200':
          description: List of reviews
    post:
      summary: Create new review
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Review'
      responses:
        '201':
          description: Review created
  /reviews/{id}/publish:
    post:
      summary: Publish review (Admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Review published

  # Testimonials
  /testimonials:
    get:
      summary: List published testimonials
      responses:
        '200':
          description: List of testimonials
    post:
      summary: Submit new testimonial
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Testimonial'
      responses:
        '201':
          description: Testimonial submitted
  /testimonials/admin:
    get:
      summary: List all testimonials (Admin)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: All testimonials

  # Bookkeeping
  /bookkeeping/income:
    get:
      summary: List income records
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Income records
    post:
      summary: Create income record
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Income'
      responses:
        '201':
          description: Income record created
  /bookkeeping/expenses:
    get:
      summary: List expenses
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Expense records
    post:
      summary: Create expense record
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Expense'
      responses:
        '201':
          description: Expense record created
  /bookkeeping/summary:
    get:
      summary: Get financial summary
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Financial summary

  # Referrals
  /referrals:
    get:
      summary: List all referrals (Admin)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of referrals
    post:
      summary: Create a referral code (Admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [client_id]
              properties:
                client_id: { type: integer }
                code: { type: string }
                discount_type: { type: string, enum: [percentage, fixed] }
                discount_value: { type: number }
                status: { type: string }
      responses:
        '201':
          description: Referral created
  /referrals/code/{code}:
    get:
      summary: Get referral details by code
      parameters:
        - in: path
          name: code
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Referral details
  /referrals/my:
    get:
      summary: Get user's referral code and stats
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Referral stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  referral_code: { type: string }
                  points_balance: { type: integer }
  /referrals/redeem:
    post:
      summary: Redeem referral points
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Points redeemed

  # Users & Clients
  /users:
    get:
      summary: Get all users (Admin)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
  /users/customers:
    get:
      summary: Get all customers
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of customers
  /users/{id}:
    get:
      summary: Get user by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: User details
  /clients:
    get:
      summary: Get all clients with full profile data
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of clients

  # Employee Management
  /employees:
    get:
      summary: Manage employees
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: List of employees
    post:
      summary: Create employee
      security: [{ bearerAuth: [] }]
      responses:
        '201':
          description: Employee created
  /employees/{id}:
    put:
      summary: Update employee
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Employee updated
    delete:
      summary: Delete employee
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Employee deleted